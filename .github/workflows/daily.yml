name: Busca Promoções Xbox

on:
  schedule:
    - cron: '0 13 * * *'   # Roda todo dia às 13h UTC (10h Brasil)
  workflow_dispatch:        # Permite rodar manualmente
    inputs:
      desconto_minimo:
        description: 'Desconto mínimo (%) só para esta execução manual (deixe em branco para usar o padrão)'
        required: false
        default: ''

jobs:
  buscar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      - name: 🤖 Rodar o bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
          DESCONTO_MINIMO: ${{ github.event.inputs.desconto_minimo || vars.DESCONTO_MINIMO || '85' }}
        run: python bot.py

      - name: 💾 Salvar histórico atualizado
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add historico.json || echo "Sem mudanças"
          git commit -m "Atualiza histórico de promoções" || echo "Nada para commitar"
          git push
